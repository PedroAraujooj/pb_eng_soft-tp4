name: Quality - Static Analysis

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-analysis:
    name: Checkstyle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Dar permissão ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Rodar análise estática
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon --stacktrace

      - name: Publicar relatório do Checkstyle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/**
          if-no-files-found: warn

      - name: Resumo do job
        if: always()
        run: |
          echo "## Resultado da análise estática" >> $GITHUB_STEP_SUMMARY
          echo "- Checkstyle executado" >> $GITHUB_STEP_SUMMARY
          echo "- Relatório HTML/XML anexado como artifact" >> $GITHUB_STEP_SUMMARY