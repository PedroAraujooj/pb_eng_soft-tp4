name: Quality - Static Analysis

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Checkstyle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven


      - name: Rodar análise estática
        run: mvn -B checkstyle:checkstyle checkstyle:check

      - name: Publicar relatório do Checkstyle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/site/checkstyle.html
          if-no-files-found: warn

      - name: Resumo do job
        if: always()
        run: |
          echo "## Resultado da análise estática" >> $GITHUB_STEP_SUMMARY
          echo "- Checkstyle executado" >> $GITHUB_STEP_SUMMARY
          echo "- Relatório publicado como artifact" >> $GITHUB_STEP_SUMMARY