name: CI - Build, Test and Coverage

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build + Tests + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x mvnw

      - name: Rodar build, testes, integração e cobertura
        run: ./mvnw -B clean verify

      - name: Publicar relatórios de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
          if-no-files-found: warn

      - name: Publicar relatório de cobertura JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            target/site/jacoco/**
            target/jacoco.exec
          if-no-files-found: warn

      - name: Publicar artefato da aplicação
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          if-no-files-found: warn

      - name: Resumo do job
        if: always()
        run: |
          echo "## Resultado da CI" >> $GITHUB_STEP_SUMMARY
          echo "- Build Maven executado" >> $GITHUB_STEP_SUMMARY
          echo "- Testes unitários executados" >> $GITHUB_STEP_SUMMARY
          echo "- Testes de integração executados (se houver)" >> $GITHUB_STEP_SUMMARY
          echo "- Cobertura JaCoCo validada" >> $GITHUB_STEP_SUMMARY
          echo "- Relatórios publicados como artifacts" >> $GITHUB_STEP_SUMMARY