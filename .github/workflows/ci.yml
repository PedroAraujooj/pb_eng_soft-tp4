name: CI - Build, Test and Coverage

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build + Tests + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Dar permissão ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Rodar testes e validar cobertura
        run: ./gradlew clean test jacocoTestReport jacocoTestCoverageVerification --no-daemon --stacktrace

      - name: Publicar relatórios de testes e cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            build/reports/tests/test/**
            build/test-results/test/**
            build/reports/jacoco/test/**
          if-no-files-found: warn

      - name: Gerar JAR da aplicação
        run: ./gradlew bootJar --no-daemon --stacktrace

      - name: Publicar artefato da aplicação
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Resumo do job
        if: always()
        run: |
          echo "## Resultado da CI" >> $GITHUB_STEP_SUMMARY
          echo "- Build Spring Boot com Gradle executado" >> $GITHUB_STEP_SUMMARY
          echo "- Testes automatizados executados" >> $GITHUB_STEP_SUMMARY
          echo "- Cobertura validada pelo JaCoCo" >> $GITHUB_STEP_SUMMARY
          echo "- Relatórios anexados como artifacts" >> $GITHUB_STEP_SUMMARY